                    <circle class="bulb bulb-orange" cx="400" cy="160" r="4" data-layer="4"/>
                    <!-- Upper Right -->
                    <circle class="bulb bulb-blue" cx="520" cy="170" r="4" data-layer="4"/>
                    <circle class="bulb bulb-red" cx="500" cy="185" r="4" data-layer="4"/>
                    <!-- Right -->
                    <circle class="bulb bulb-white" cx="545" cy="280" r="4" data-layer="4"/>
                    <circle class="bulb bulb-yellow" cx="525" cy="280" r="4" data-layer="4"/>
                    <!-- Lower Right -->
                    <circle class="bulb bulb-orange" cx="520" cy="390" r="4" data-layer="4"/>
                    <circle class="bulb bulb-blue" cx="500" cy="375" r="4" data-layer="4"/>
                    <!-- Down -->
                    <circle class="bulb bulb-red" cx="400" cy="420" r="4" data-layer="4"/>
                    <circle class="bulb bulb-white" cx="400" cy="400" r="4" data-layer="4"/>
                    <!-- Lower Left -->
                    <circle class="bulb bulb-yellow" cx="280" cy="390" r="4" data-layer="4"/>
                    <circle class="bulb bulb-orange" cx="300" cy="375" r="4" data-layer="4"/>
                    <!-- Left -->
                    <circle class="bulb bulb-blue" cx="255" cy="280" r="4" data-layer="4"/>
                    <circle class="bulb bulb-red" cx="275" cy="280" r="4" data-layer="4"/>
                    <!-- Upper Left -->
                    <circle class="bulb bulb-white" cx="280" cy="170" r="4" data-layer="4"/>
                    <circle class="bulb bulb-yellow" cx="300" cy="185" r="4" data-layer="4"/>
                </g>

                <!-- CIRCUIT 6: Panel Highlight Bulbs (Layer 5) - scattered around panels -->
                <g id="panelHighlightBulbs">
                    <circle class="bulb bulb-orange" cx="130" cy="485" r="4" data-layer="5"/>
                    <circle class="bulb bulb-blue" cx="275" cy="485" r="4" data-layer="5"/>
                    <circle class="bulb bulb-yellow" cx="400" cy="470" r="5" data-layer="5"/>
                    <circle class="bulb bulb-red" cx="525" cy="485" r="4" data-layer="5"/>
                    <circle class="bulb bulb-white" cx="670" cy="485" r="4" data-layer="5"/>
                    <!-- Between panels top -->
                    <circle class="bulb bulb-orange" cx="200" cy="478" r="3" data-layer="5"/>
                    <circle class="bulb bulb-blue" cx="345" cy="478" r="3" data-layer="5"/>
                    <circle class="bulb bulb-yellow" cx="455" cy="478" r="3" data-layer="5"/>
                    <circle class="bulb bulb-red" cx="600" cy="478" r="3" data-layer="5"/>
                </g>

                <!-- Decorative Pillar Bases -->
                <rect x="20" y="645" width="50" height="20" rx="4" fill="#0b0d1e" stroke="url(#goldGrad)" stroke-width="2"/>
                <rect x="730" y="645" width="50" height="20" rx="4" fill="#0b0d1e" stroke="url(#goldGrad)" stroke-width="2"/>
            </svg>

            <!-- Audio controls below pandal -->
            <div class="audio-controls" style="margin-top: 1.5rem;">
                <button id="btnAmbientAudio" class="btn-audio">🎵 Play Ambient Music</button>
            </div>
        </section>

        <!-- Right: Narrative Panel & Config Dashboard -->
        <section class="thorana-dashboard">

            <!-- Story Narrative Card -->
            <div class="story-card">
                <div class="story-header">
                    <span id="storyBadge" class="story-badge">පැනලය 1 / Panel 1</span>
                    <div class="story-lang-toggle">
                        <button id="btnLangSi" class="btn-lang active">සිංහල</button>
                        <button id="btnLangEn" class="btn-lang">English</button>
                    </div>
                </div>

                <div class="story-body">
                    <h3 id="storyTitleSi" class="story-text-sinhala" style="font-size:1.5rem;color:var(--color-yellow);margin-bottom:10px;"></h3>
                    <h3 id="storyTitleEn" class="story-text-english" style="font-size:1.2rem;color:var(--color-yellow);margin-bottom:10px;display:none;"></h3>

                    <div class="story-image-placeholder">
                        <img id="storyImage" src="assets/panel1.jpg" alt="Sasa Jataka Story Panel">
                        <div id="storyImgFallback" style="font-size:5rem;filter:drop-shadow(0 0 15px var(--color-yellow));display:none;position:absolute;"></div>
                    </div>

                    <div class="story-text" style="margin-top:1.5rem;">
                        <p id="storyTextSi" class="story-text-sinhala"></p>
                        <p id="storyTextEn" class="story-text-english" style="display:none;"></p>
                    </div>
                </div>

                <div class="story-nav">
                    <button id="btnPrev" class="btn-story-nav" disabled>◀</button>
                    <div class="auto-play-bar">
                        <button id="btnSpeech" class="btn-audio" style="font-size:0.8rem;padding:6px 14px;">🗣️ Read Aloud</button>
                        <button id="btnAutoPlay" class="btn-audio" style="font-size:0.8rem;padding:6px 14px;">🔄 Auto Play</button>
                    </div>
                    <button id="btnNext" class="btn-story-nav">▶</button>
                </div>
            </div>

            <!-- Lighting Pattern Config -->
            <div class="control-group">
                <span class="control-label">💡 Flashing Pattern (ආලෝක රටාව)</span>
                <div class="pattern-grid">
                    <button class="btn-pattern active" data-pattern="chasing">🔄 Chasing</button>
                    <button class="btn-pattern" data-pattern="aura">✨ Golden Aura</button>
                    <button class="btn-pattern" data-pattern="sparkle">💎 Sparkle</button>
                    <button class="btn-pattern" data-pattern="rainbow">🌈 Flag Rainbow</button>
                    <button class="btn-pattern" data-pattern="spiral">🌀 Spiral Swirl</button>
                    <button class="btn-pattern" data-pattern="calm">🌊 Breathing</button>
                </div>
            </div>

            <!-- Speed -->
            <div class="control-group">
                <div style="display:flex;justify-content:space-between;">
                    <span class="control-label">⚡ Flashing Speed</span>
                    <span id="speedVal" style="font-size:0.85rem;color:var(--color-yellow);font-weight:bold;">Normal</span>
                </div>
                <input id="speedSlider" type="range" class="speed-slider" min="1" max="10" value="6">
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer-text">
        සැමදෙනාටම ධර්මයේ ආලෝකය ලැබේවා! May all beings be happy and peaceful.<br>
        Digital Vesak Pandal &amp; Greetings © 2026. Made for <span>Vesak Poya Day</span>.
    </footer>

    <script src="script.js"></script>
</body>
